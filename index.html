<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>漫画ネーム制作ツール 極・改</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #222; color: #eee; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 340px; background: #1a1a1a; padding: 20px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #444; overflow-y: auto; z-index: 10; }
        textarea { width: 100%; height: 100px; background: #333; color: white; border: 1px solid #555; padding: 10px; box-sizing: border-box; border-radius: 4px; font-size: 14px; }
        select, button { cursor: pointer; padding: 10px; background: #4a90e2; color: white; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        select { background: #333; border: 1px solid #555; font-size: 12px; }
        button:hover { background: #357abd; }
        .layer-ctrl { background: #333; padding: 12px; border-radius: 8px; border: 1px solid #444; }
        .layer-title { font-size: 11px; margin-bottom: 8px; color: #aaa; display: block; }
        .mode-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .mode-btn { background: #444; color: #888; font-size: 10px; padding: 6px 2px; border: 1px solid #555; }
        .mode-btn.active { background: #4a90e2; color: white; border-color: #7abaff; }
        .main-view { flex: 1; display: flex; flex-direction: column; align-items: center; overflow: auto; padding: 60px 0; scroll-snap-type: y mandatory; }
        .spread-container { display: flex; flex-direction: row-reverse; gap: 20px; padding: 60px; scroll-snap-align: center; }
        .canvas-box { background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.6); position: relative; border: 2px solid transparent; }
        .canvas-box.active { border: 2px solid #4a90e2; }
        .page-label { position: absolute; top: -30px; width: 100%; text-align: center; color: #aaa; font-weight: bold; pointer-events: none; }
        .canvas-box.active .page-label { color: #4a90e2; font-size: 1.2em; }
        .parts-box { background: #2a2a2a; padding: 10px; border-radius: 4px; max-height: 180px; overflow-y: auto; border: 1px inset #111; }
        .serifu-item { background: #f0f0f0; color: #000; padding: 8px; margin-bottom: 5px; cursor: pointer; font-size: 13px; border-radius: 3px; font-weight: bold; white-space: pre-wrap; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .face-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
        .face-btn { background: #e67e22; font-size: 10px; padding: 8px 2px; }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="layer-ctrl">
        <span class="layer-title">編集モード</span>
        <div class="mode-buttons">
            <button class="mode-btn active" id="btn-all" onclick="setEditMode('all')">すべて</button>
            <button class="mode-btn" id="btn-frame" onclick="setEditMode('frame')">コマ</button>
            <button class="mode-btn" id="btn-serifu" onclick="setEditMode('serifu')">セリフ</button>
            <button class="mode-btn" id="btn-char" onclick="setEditMode('char')">キャラ</button>
        </div>
    </div>
    
    <label>1. セリフ投入 (空行区切り, !!対応)</label>
    <textarea id="csvInput" placeholder="セリフを入力...">マジで!!&#13;&#10;焦るわー!!</textarea>
    
    <select id="fontSelect">
        <option value="'MS Gothic', sans-serif">ＭＳ ゴシック</option>
        <option value="'MS Mincho', serif">ＭＳ 明朝</option>
        <option value="'Meiryo', sans-serif">メイリオ</option>
        <option value="'Yu Gothic', sans-serif">游ゴシック</option>
        <option value="'GenEi Antique Pv5', serif">源暎アンチック</option>
    </select>
    
    <button onclick="importSerifu()">リスト更新</button>
    <div class="parts-box" id="partsBox"></div>

    <label>2. パーツ追加</label>
    <button onclick="addFrame()" style="background: #555;">コマ枠を追加</button>
    
    <div class="layer-ctrl">
        <span class="layer-title">キャラ（白塗り）</span>
        <div class="face-buttons">
            <button class="face-btn" onclick="addCharacter('front')">正面</button>
            <button class="face-btn" onclick="addCharacter('side')">横向き</button>
            <button class="face-btn" onclick="addCharacter('back')">後ろ姿</button>
        </div>
    </div>
    
    <hr style="width:100%; border:0; border-top:1px solid #444;">
    
    <label>3. 管理・出力</label>
    <button onclick="downloadProject()" style="background: #27ae60; width:100%; margin-bottom:5px;">プロジェクト保存</button>
    <button onclick="document.getElementById('fileInput').click()" style="background: #8e44ad; width:100%; margin-bottom:5px;">プロジェクト読込</button>
    <input type="file" id="fileInput" accept=".json" onchange="loadProject(event)">
    <button onclick="exportPDF()" style="background: #c0392b; width:100%;">PDF書き出し</button>
</div>

<div class="main-view" id="scrollArea"></div>

<script>
    const totalPages = 40;
    const canvases = [];
    let activePageIdx = 1;
    let clipboard = null;
    let offsetCounter = 0;
    let currentEditMode = 'all';
    const history = {};
    let isHistoryLocked = false;

    // キャンバス初期化
    const scrollArea = document.getElementById('scrollArea');
    for (let i = 1; i <= totalPages; i += 2) {
        const container = document.createElement('div');
        container.className = 'spread-container';
        container.appendChild(createCanvasElement(i));
        if(i+1 <= totalPages) container.appendChild(createCanvasElement(i + 1));
        scrollArea.appendChild(container);
    }

    function createCanvasElement(num) {
        const wrapper = document.createElement('div');
        wrapper.className = 'canvas-box'; wrapper.id = `wrapper-${num}`;
        wrapper.innerHTML = `<div class="page-label">P.${num}</div><canvas id="pc-${num}"></canvas>`;
        return wrapper;
    }

    for (let i = 1; i <= totalPages; i++) {
        const c = new fabric.Canvas(`pc-${i}`, { width: 420, height: 600, backgroundColor: '#fff' });
        history[i] = { undos: [], redos: [] };
        c.on('object:added', (opt) => { if(!opt.target.customType) opt.target.customType = 'unknown'; sortLayers(c); saveHistory(i); });
        c.on('object:modified', () => { sortLayers(c); saveHistory(i); });
        c.on('object:removed', () => saveHistory(i));
        c.on('mouse:down', () => setActivePage(i));
        c.on('mouse:wheel', function(opt) {
            if (opt.e.ctrlKey) {
                const delta = opt.e.deltaY;
                let zoom = c.getZoom() * (0.999 ** delta);
                zoom = Math.min(Math.max(zoom, 0.2), 5);
                canvases.forEach(can => { if(can){ can.setZoom(zoom); can.renderAll(); }});
                opt.e.preventDefault(); opt.e.stopPropagation();
            }
        });
        canvases[i] = c;
    }

    // --- 縦書き生成 (!!対応) ---
    function createSerifuData(text, font) {
        const tempCanvas = document.createElement('canvas');
        const tCtx = tempCanvas.getContext('2d');
        const fSize = 28;
        
        // 縦書き用にテキストをパースする（!!を1つのブロックとして扱う）
        const lines = text.split('\n');
        const parsedLines = lines.map(line => {
            const chars = [];
            for (let i = 0; i < line.length; i++) {
                if (line[i] === '!' && line[i+1] === '!') {
                    chars.push('!!'); // 連打はまとめる
                    i++; 
                } else {
                    chars.push(line[i]);
                }
            }
            return chars;
        });

        tempCanvas.width = lines.length * (fSize * 1.3) + 40;
        const maxChars = Math.max(...parsedLines.map(l => l.length));
        tempCanvas.height = maxChars * fSize + 40;
        
        tCtx.font = `bold ${fSize}px ${font}`;
        tCtx.textBaseline = 'top';
        tCtx.textAlign = 'center';
        tCtx.fillStyle = "black";

        parsedLines.forEach((lineChars, i) => {
            const x = tempCanvas.width - (i * fSize * 1.3) - (fSize + 10);
            lineChars.forEach((char, j) => {
                let y = j * fSize + 10;
                
                if (char === '!!') {
                    // !! は横並び（縦中横）
                    tCtx.save();
                    tCtx.font = `bold ${fSize * 0.8}px ${font}`; // 少し小さく
                    tCtx.fillText('!!', x, y + fSize*0.1);
                    tCtx.restore();
                } else if ("ー〜－―".includes(char)) {
                    // 記号の回転
                    tCtx.save(); tCtx.translate(x, y + fSize/2); tCtx.rotate(Math.PI / 2); tCtx.fillText(char, 0, -fSize/2); tCtx.restore();
                } else if ("、。".includes(char)) {
                    // 句読点の位置調整
                    tCtx.fillText(char, x + fSize*0.4, y - fSize*0.4);
                } else {
                    tCtx.fillText(char, x, y);
                }
            });
        });
        return tempCanvas.toDataURL();
    }

    // --- キャラ追加 (簡易図形データ) ---
    function addCharacter(type) {
        const pos = getOffsetCoord();
        const headParams = { radius: 25, fill: '#fff', stroke: 'black', strokeWidth: 2, left: 10, top: 0 };
        const bodyParams = { width: 60, height: 70, fill: '#fff', stroke: 'black', strokeWidth: 2, left: 5, top: 45 };
        
        const head = new fabric.Circle(headParams);
        const body = new fabric.Triangle(bodyParams);
        const groupParts = [body, head];

        // 顔のディテール（白塗り）
        const featureParams = { fill: '#fff', stroke: 'black', strokeWidth: 1.5 };

        if (type === 'front') {
            // 正面：目2つ、口
            groupParts.push(new fabric.Circle({ ...featureParams, radius: 3, left: 22, top: 15 }));
            groupParts.push(new fabric.Circle({ ...featureParams, radius: 3, left: 38, top: 15 }));
            groupParts.push(new fabric.Ellipse({ ...featureParams, rx: 8, ry: 3, left: 27, top: 30 }));
        } else if (type === 'side') {
            // 横向き：目1つ、鼻
            groupParts.push(new fabric.Circle({ ...featureParams, radius: 3, left: 18, top: 15 }));
            groupParts.push(new fabric.Triangle({ ...featureParams, width: 8, height: 12, left: 8, top: 20, angle: -90 }));
        } else if (type === 'back') {
            // 後ろ姿：ディテールなし、髪のラインっぽいものだけ
            groupParts.push(new fabric.Path('M 15 10 Q 35 5 55 10', { ...featureParams, fill: 'transparent', strokeWidth: 2, left: 15, top: 5 }));
        }

        const char = new fabric.Group(groupParts, { 
            left: pos.left, top: pos.top, customType: 'char' 
        });
        canvases[activePageIdx].add(char).setActiveObject(char);
    }

    // --- 既存機能 ---
    function importSerifu() {
        const input = document.getElementById('csvInput').value;
        const font = document.getElementById('fontSelect').value;
        const blocks = input.split(/\n\s*\n/).filter(b => b.trim() !== "");
        const box = document.getElementById('partsBox'); box.innerHTML = "";
        blocks.forEach(text => {
            const cleanText = text.trim();
            const div = document.createElement('div'); div.className = 'serifu-item'; div.innerText = cleanText;
            div.onclick = () => {
                fabric.Image.fromURL(createSerifuData(cleanText, font), img => {
                    const pos = getOffsetCoord();
                    img.set({left: pos.left, top: pos.top, customType: 'serifu', lockUniScaling: true});
                    canvases[activePageIdx].add(img).setActiveObject(img);
                });
            };
            box.appendChild(div);
        });
    }
    function sortLayers(canvas) { canvas.getObjects().forEach(obj => { if (obj.customType === 'serifu') canvas.bringToFront(obj); }); }
    function setEditMode(mode) {
        currentEditMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        canvases.forEach(c => {
            if(!c) return;
            c.getObjects().forEach(obj => {
                let isMatch = (mode === 'all' || (mode === obj.customType));
                obj.set({ selectable: isMatch, evented: isMatch, opacity: (mode === 'all' || isMatch) ? 1.0 : 0.3 });
            });
            c.discardActiveObject(); c.requestRenderAll();
        });
    }
    function setActivePage(idx) { if (activePageIdx !== idx) offsetCounter = 0; activePageIdx = idx; document.querySelectorAll('.canvas-box').forEach(el => el.classList.remove('active')); document.getElementById(`wrapper-${idx}`).classList.add('active'); }
    function addFrame() { const pos = getOffsetCoord(); const rect = new fabric.Rect({ left: pos.left, top: pos.top, width: 300, height: 200, fill: 'transparent', stroke: 'black', strokeWidth: 3, customType: 'frame' }); canvases[activePageIdx].add(rect).setActiveObject(rect); }
    function downloadProject() { const projectData = { pages: canvases.map(c => c ? c.toJSON(['customType', 'lockUniScaling']) : null) }; const blob = new Blob([JSON.stringify(projectData)], { type: "application/json" }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `name_project_${Date.now()}.json`; a.click(); }
    function loadProject(event) { const reader = new FileReader(); reader.onload = (e) => { const data = JSON.parse(e.target.result); isHistoryLocked = true; data.pages.forEach((json, idx) => { if (json && canvases[idx]) canvases[idx].loadFromJSON(json, () => { sortLayers(canvases[idx]); canvases[idx].renderAll(); if(idx === totalPages) { isHistoryLocked = false; setEditMode(currentEditMode); } }); }); }; reader.readAsText(event.target.files[0]); }
    function saveHistory(idx) { if (isHistoryLocked) return; const state = JSON.stringify(canvases[idx].toJSON(['customType', 'lockUniScaling'])); if (history[idx].undos.slice(-1)[0] === state) return; history[idx].undos.push(state); history[idx].redos = []; }
    function undo() { const h = history[activePageIdx]; if (h.undos.length <= 1) return; isHistoryLocked = true; h.redos.push(h.undos.pop()); canvases[activePageIdx].loadFromJSON(h.undos[h.undos.length-1], () => { canvases[activePageIdx].renderAll(); isHistoryLocked = false; setEditMode(currentEditMode); }); }
    function redo() { const h = history[activePageIdx]; if (h.redos.length === 0) return; isHistoryLocked = true; const state = h.redos.pop(); h.undos.push(state); canvases[activePageIdx].loadFromJSON(state, () => { canvases[activePageIdx].renderAll(); isHistoryLocked = false; setEditMode(currentEditMode); }); }
    function getOffsetCoord() { const pos = { left: 40 + (offsetCounter * 25), top: 40 + (offsetCounter * 25) }; offsetCounter = (offsetCounter + 1) % 6; return pos; }
    window.addEventListener('keydown', (e) => {
        if (document.activeElement.tagName === 'TEXTAREA') return;
        if (e.ctrlKey || e.metaKey) {
            if (e.key === 'z') { e.preventDefault(); undo(); }
            if (e.key === 'y') { e.preventDefault(); redo(); }
            if (e.key === 'c') { const t = canvases[activePageIdx].getActiveObject(); if(t) t.clone(cl => { cl.customType = t.customType; cl.lockUniScaling = t.lockUniScaling; clipboard = cl; }, ['customType', 'lockUniScaling']); }
            if (e.key === 'v') { if(!clipboard) return; const pos = getOffsetCoord(); clipboard.clone(cl => { canvases[activePageIdx].discardActiveObject(); cl.set({left:pos.left, top:pos.top, evented:true, customType: clipboard.customType, lockUniScaling: clipboard.lockUniScaling}); canvases[activePageIdx].add(cl).setActiveObject(cl); }, ['customType', 'lockUniScaling']); }
        }
        if (e.key === 'Delete' || e.key === 'Backspace') { const acts = canvases[activePageIdx].getActiveObjects(); canvases[activePageIdx].remove(...acts).discardActiveObject().renderAll(); }
    });
    async function exportPDF() { const { jsPDF } = window.jspdf; const pdf = new jsPDF('p', 'mm', 'a4'); for (let i = 1; i <= totalPages; i++) { if (i > 1) pdf.addPage(); pdf.addImage(canvases[i].toDataURL({ format: 'png' }), 'PNG', 0, 0, 210, 297); } pdf.save("comic_name.pdf"); }
    window.onload = () => { setActivePage(1); for(let i=1; i<=totalPages; i++) saveHistory(i); importSerifu(); };
</script>
</body>
</html>
